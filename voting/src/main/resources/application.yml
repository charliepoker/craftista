# Voting Service Configuration

# Catalogue Service Integration
catalogue:
  service-url: ${CATALOGUE_SERVICE_URL:http://catalogue:5000/api/products}
  sync-interval: ${CATALOGUE_SYNC_INTERVAL:60000} # 1 minute in milliseconds

# Database Configuration
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:development}

  # PostgreSQL Configuration (Production)
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/voting}
    username: ${DATABASE_USERNAME:voting_user}
    password: ${DATABASE_PASSWORD:voting_pass}
    driver-class-name: org.postgresql.Driver

    # HikariCP Connection Pool Configuration
    hikari:
      maximum-pool-size: ${DATABASE_MAX_CONNECTIONS:10}
      connection-timeout: ${DATABASE_CONNECTION_TIMEOUT:20000}

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  # Flyway Migration Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# Actuator Configuration for Health Checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    db:
      enabled: true
    diskspace:
      enabled: true

# Logging Configuration
logging:
  level:
    com.example.voting: ${LOG_LEVEL:INFO}
    org.springframework.web: ${WEB_LOG_LEVEL:WARN}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: ${SQL_PARAM_LOG_LEVEL:WARN}
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{correlationId}] %logger{36} - %msg%n"

# Application Configuration
app:
  name: voting-service
  version: ${APP_VERSION:1.0.0}

  # Database Configuration
  database:
    retry:
      max-attempts: ${DATABASE_RETRY_ATTEMPTS:3}
      delay: ${DATABASE_RETRY_DELAY:1000}
      multiplier: ${DATABASE_RETRY_MULTIPLIER:2.0}

    # Circuit Breaker Configuration
    circuit-breaker:
      failure-rate-threshold: ${CIRCUIT_BREAKER_FAILURE_RATE:50}
      wait-duration-in-open-state: ${CIRCUIT_BREAKER_WAIT_DURATION:30000}
      sliding-window-size: ${CIRCUIT_BREAKER_SLIDING_WINDOW:10}

---
# Development Profile
spring:
  config:
    activate:
      on-profile: development

  # H2 Configuration for Development
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: password
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: false

---
# Test Profile
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: password
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

---
# Production Profile
spring:
  config:
    activate:
      on-profile: production

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.example.voting: INFO
    org.springframework.web: WARN
