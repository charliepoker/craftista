# Catalogue Service Endpoint 
# Voting App Syncs the Origami List from Catalogue Service 
# at an interval of 1 min 
catalogue.service-url=http://catalogue:5000/api/products

# Database configuration - using environment variables for production
# See application.yml for full database configuration

# JPA
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


