# Quality Gates Configuration for Database Testing
# This file defines the minimum quality standards for database operations

quality_gates:
  coverage:
    # Minimum code coverage thresholds
    catalogue:
      line_coverage: 85
      branch_coverage: 80
      database_operations: 90
    voting:
      line_coverage: 80
      branch_coverage: 75
      database_operations: 85
    recommendation:
      line_coverage: 80
      branch_coverage: 75
      database_operations: 85

  performance:
    # Performance benchmarks for database operations
    database_connection:
      max_connection_time_ms: 1000
      max_pool_exhaustion_time_ms: 5000

    query_performance:
      catalogue:
        max_query_time_ms: 500
        max_search_time_ms: 1000
      voting:
        max_query_time_ms: 300
        max_vote_operation_ms: 200
      recommendation:
        max_cache_operation_ms: 100
        max_recommendation_generation_ms: 2000

    concurrent_operations:
      min_concurrent_connections: 10
      max_response_time_under_load_ms: 2000

  reliability:
    # Reliability requirements
    circuit_breaker:
      failure_threshold: 5
      timeout_duration_ms: 10000
      recovery_timeout_ms: 30000

    retry_policy:
      max_retries: 3
      backoff_multiplier: 2
      max_backoff_ms: 10000

    health_checks:
      database_health_timeout_ms: 5000
      required_health_endpoints:
        - "/health/database"
        - "/health/ready"

  security:
    # Security requirements
    database_security:
      require_ssl: true
      require_authentication: true
      min_password_strength: 8
      connection_encryption: true

    sql_injection:
      require_prepared_statements: true
      input_validation: true
      parameterized_queries: true

# Test requirements
test_requirements:
  unit_tests:
    min_test_coverage: 85
    required_test_types:
      - "CRUD operations"
      - "Connection handling"
      - "Error scenarios"
      - "Validation logic"

  integration_tests:
    min_test_coverage: 75
    required_test_scenarios:
      - "Database connectivity"
      - "Transaction handling"
      - "Migration scripts"
      - "Cross-service data flow"

  performance_tests:
    required_benchmarks:
      - "Connection pool performance"
      - "Query execution time"
      - "Concurrent operation handling"
      - "Memory usage under load"

# Deployment gates
deployment_gates:
  pre_deployment:
    - "All unit tests pass"
    - "All integration tests pass"
    - "Coverage thresholds met"
    - "Performance benchmarks met"
    - "Security scans pass"

  post_deployment:
    - "Health checks pass"
    - "Database connectivity verified"
    - "Performance monitoring active"
    - "Error rates within acceptable limits"

# Notification settings
notifications:
  failure_channels:
    - "github_pr_comments"
    - "slack_alerts"

  success_channels:
    - "github_pr_comments"

  escalation:
    critical_failure_timeout_minutes: 30
    escalation_channels:
      - "team_leads"
      - "devops_team"
