name: CI - Voting Service

on:
  push:
    branches: [develop]
    paths:
      - "voting/**"
      - ".github/workflows/ci-voting.yml"
  pull_request:
    branches: [develop]
    paths:
      - "voting/**"
      - ".github/workflows/ci-voting.yml"

env:
  SERVICE_NAME: voting
  DOCKER_REGISTRY: docker.io
  DOCKER_IMAGE: 8060633493/craftista-voting

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./voting

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Verify build
        run: ls -la target/*.jar

      - name: Generate test coverage report
        run: mvn jacoco:report
        continue-on-error: true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: voting-coverage
          path: |
            voting/target/site/jacoco/
            voting/target/jacoco.exec
        continue-on-error: true

  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: ./voting

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Run OWASP Dependency Check
        run: |
          mvn dependency-check:check -DfailBuildOnCVSS=10.0 || true
        continue-on-error: true

      - name: Upload OWASP Dependency Check results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: voting-dependency-check
          path: |
            voting/target/dependency-check-report.html
            voting/target/dependency-check-report.json

  sast-scan:
    name: SAST - SonarQube Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: ./voting

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for better analysis

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build and analyze with SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_VOTING }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn clean compile sonar:sonar \
            -DskipTests \
            -Ddependency-check.skip=true \
            -Dsonar.projectKey=craftista-voting \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_VOTING }} \
            -Dsonar.java.binaries=target/classes
        continue-on-error: true

      - name: Check SonarQube Quality Gate
        if: hashFiles('voting/target/sonar/report-task.txt') != ''
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        with:
          scanMetadataReportFile: voting/target/sonar/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_VOTING }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build-and-test, dependency-scan]
    if: github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.tag.outputs.image-tag }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image-tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build JAR with Maven
        working-directory: ./voting
        run: mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./voting
          file: ./voting/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.image-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'push'

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ needs.build-image.outputs.image-tag }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0" # Don't fail the build, just report

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: "trivy-results.sarif"

      - name: Run Trivy vulnerability scanner (table output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ needs.build-image.outputs.image-tag }}
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1" # Fail if critical vulnerabilities found
        continue-on-error: true

  update-gitops:
    name: Update GitOps Repository
    needs: [build-image, container-scan]
    if: github.event_name == 'push'
    uses: ./.github/workflows/update-gitops.yml
    with:
      service-name: voting
      environment: dev
      image-tag: ${{ needs.build-image.outputs.image-tag }}
      docker-image: 8060633493/craftista-voting
      commit-sha: ${{ github.sha }}
      branch-name: ${{ github.ref_name }}
    secrets:
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      GITOPS_REPO_URL: ${{ secrets.GITOPS_REPO_URL }}
      GITOPS_PAT: ${{ secrets.GITOPS_PAT }}

  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs:
      [
        build-and-test,
        dependency-scan,
        sast-scan,
        build-image,
        container-scan,
        update-gitops,
      ]
    if: always()

    steps:
      - name: Check build status
        run: |
          if [[ "${{ needs.build-and-test.result }}" == "failure" ]] || \
             [[ "${{ needs.build-image.result }}" == "failure" ]]; then
            echo "❌ Build failed"
            exit 1
          else
            echo "✅ Build successful"
          fi
