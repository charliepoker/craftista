name: CI - Voting Service

on:
  push:
    branches: [develop, staging, main]
    paths:
      - "voting/**"
      - ".github/workflows/ci-voting.yml"
  pull_request:
    branches: [develop, staging, main]
    paths:
      - "voting/**"
      - ".github/workflows/ci-voting.yml"

env:
  SERVICE_NAME: voting
  DOCKER_REGISTRY: docker.io
  DOCKER_IMAGE: 8060633493/craftista-voting

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./voting

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build with Maven
        run: mvn clean compile -DskipTests

      - name: Run unit tests
        run: mvn test

      - name: Generate test coverage report
        run: mvn jacoco:report

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: voting-coverage
          path: |
            voting/target/site/jacoco/
            voting/target/jacoco.exec

      - name: Check code coverage thresholds
        run: mvn jacoco:check
        continue-on-error: true

  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: ./voting

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Run OWASP Dependency Check
        run: |
          mvn dependency-check:check -DfailBuildOnCVSS=10.0 || true
        continue-on-error: true

      - name: Upload OWASP Dependency Check results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: voting-dependency-check
          path: |
            voting/target/dependency-check-report.html
            voting/target/dependency-check-report.json

  # TODO: Uncomment when SonarQube server is set up
