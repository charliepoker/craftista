name: Sync GitOps From Docker Hub

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to sync"
        required: true
        type: choice
        options:
          - frontend
          - catalogue
          - voting
          - recommendation
      environment:
        description: "Target overlay environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      tag-prefix:
        description: "Docker tag prefix to match (e.g. develop-, staging-, main-)"
        required: true
        type: string
        default: "develop-"
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes

permissions:
  contents: read

env:
  # Docker Hub repositories for each service (namespace/repo)
  DOCKERHUB_REPO_frontend: 8060633493/craftista-frontend
  DOCKERHUB_REPO_catalogue: 8060633493/craftista-catalogue
  DOCKERHUB_REPO_voting: 8060633493/craftista-voting
  DOCKERHUB_REPO_recommendation: 8060633493/craftista-recommendation

jobs:
  resolve:
    name: Resolve latest SHA tag
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.vars.outputs.service }}
      environment: ${{ steps.vars.outputs.environment }}
      tag-prefix: ${{ steps.vars.outputs.tag-prefix }}
      docker-image: ${{ steps.vars.outputs.docker-image }}
      image-tag: ${{ steps.pick.outputs.image-tag }}
      commit-sha: ${{ steps.pick.outputs.commit-sha }}
      branch-name: ${{ steps.pick.outputs.branch-name }}
    steps:
      - name: Determine inputs
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SERVICE="${{ inputs.service }}"
            ENVIRONMENT="${{ inputs.environment }}"
            TAG_PREFIX="${{ inputs.tag-prefix }}"
          else
            # Scheduled default: keep dev tracking develop-* tags for frontend.
            SERVICE="frontend"
            ENVIRONMENT="dev"
            TAG_PREFIX="develop-"
          fi

          DOCKER_IMAGE_VAR="DOCKERHUB_REPO_${SERVICE}"
          DOCKER_IMAGE="${!DOCKER_IMAGE_VAR}"

          if [[ -z "$DOCKER_IMAGE" ]]; then
            echo "❌ No Docker Hub repo configured for service '$SERVICE'"
            exit 1
          fi

          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "tag-prefix=$TAG_PREFIX" >> "$GITHUB_OUTPUT"
          echo "docker-image=$DOCKER_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Pick newest SHA-based tag from Docker Hub
        id: pick
        shell: bash
        run: |
          set -euo pipefail

          SERVICE="${{ steps.vars.outputs.service }}"
          TAG_PREFIX="${{ steps.vars.outputs.tag-prefix }}"
          DOCKER_IMAGE="${{ steps.vars.outputs.docker-image }}"

          echo "Querying Docker Hub tags for: $DOCKER_IMAGE"
          echo "Matching prefix: $TAG_PREFIX"

          # Docker Hub API: order by last_updated so first matching tag is the newest.
          API_URL="https://hub.docker.com/v2/repositories/${DOCKER_IMAGE}/tags?page_size=100&ordering=last_updated"

          # We only accept commit-SHA style tags: <prefix><40-hex>
          # Example: develop-0123456789abcdef... (40 chars)
          PATTERN="^${TAG_PREFIX}[0-9a-f]{40}$"

          IMAGE_TAG=$(curl -fsSL "$API_URL" \
            | jq -r '.results[].name' \
            | grep -E "$PATTERN" \
            | head -n 1 || true)

          if [[ -z "$IMAGE_TAG" ]]; then
            echo "❌ No SHA-based tag found on Docker Hub matching '$PATTERN'"
            echo "Tip: ensure your build pushes tags like '${TAG_PREFIX}<full_sha>' and not just 'latest'."
            exit 1
          fi

          COMMIT_SHA="${IMAGE_TAG#${TAG_PREFIX}}"
          BRANCH_NAME="${TAG_PREFIX%-}"

          echo "✅ Picked tag: $IMAGE_TAG"
          echo "image-tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "commit-sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "branch-name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

  update-gitops:
    name: Update GitOps repo
    needs: resolve
    uses: ./.github/workflows/update-gitops.yml
    with:
      service-name: ${{ needs.resolve.outputs.service }}
      environment: ${{ needs.resolve.outputs.environment }}
      image-tag: ${{ needs.resolve.outputs.image-tag }}
      docker-image: ${{ needs.resolve.outputs.docker-image }}
      commit-sha: ${{ needs.resolve.outputs.commit-sha }}
      branch-name: ${{ needs.resolve.outputs.branch-name }}
    secrets:
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      GITOPS_REPO_URL: ${{ secrets.GITOPS_REPO_URL }}
