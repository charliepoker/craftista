name: CI - Catalogue Service

on:
  push:
    branches: [develop, staging, main]
    paths:
      - "catalogue/**"
      - ".github/workflows/ci-catalogue.yml"
  pull_request:
    branches: [develop, staging, main]
    paths:
      - "catalogue/**"
      - ".github/workflows/ci-catalogue.yml"

env:
  SERVICE_NAME: catalogue
  DOCKER_REGISTRY: docker.io
  DOCKER_IMAGE: 8060633493/craftista-catalogue

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./catalogue

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: catalogue/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run pytest unit tests
        env:
          SKIP_INTEGRATION_TESTS: "true"
        run: pytest tests/ -v -m 'not integration and not performance' --ignore=tests/integration --ignore=tests/performance

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: catalogue-coverage
          path: |
            catalogue/coverage.xml
            catalogue/htmlcov/

  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: ./catalogue

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and security scanning tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install safety pip-audit

      - name: Run Safety check
        run: |
          safety check --json > safety-results.json || true
          safety check || true
        continue-on-error: true

      - name: Run pip-audit
        run: |
          pip-audit --desc --format json --output pip-audit-results.json || true
          pip-audit --desc || true
        continue-on-error: true

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: catalogue-security-scans
          path: |
            catalogue/safety-results.json
            catalogue/pip-audit-results.json

  sast-scan:
    name: SAST - SonarQube Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for better analysis

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: catalogue/requirements.txt

      - name: Install dependencies
        working-directory: ./catalogue
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Generate coverage
        env:
          SKIP_INTEGRATION_TESTS: "true"
        working-directory: ./catalogue
        run: |
          pytest tests/ --cov=. --cov-report=xml --cov-report=html -m 'not integration and not performance' --ignore=tests/integration --ignore=tests/performance

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: catalogue
          args: >
            -Dsonar.projectKey=craftista-catalogue
            -Dsonar.sources=.
            -Dsonar.exclusions=tests/**,venv/**,htmlcov/**,**/__pycache__/**
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.python.version=3.11
        continue-on-error: true

      - name: Check SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        with:
          scanMetadataReportFile: catalogue/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build-and-test, dependency-scan]
    if: github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=long,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./catalogue
          file: ./catalogue/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'push'

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}-${{ github.sha }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0" # Don't fail the build, just report

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: "trivy-results.sarif"

      - name: Run Trivy vulnerability scanner (table output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}-${{ github.sha }}
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1" # Fail if critical vulnerabilities found
        continue-on-error: true

  resolve-image-tag:
    name: Resolve image tag (Docker Hub)
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.pick.outputs.image-tag }}
      commit-sha: ${{ steps.pick.outputs.commit-sha }}

    steps:
      - name: Pick newest SHA-based tag from Docker Hub (no latest)
        id: pick
        shell: bash
        run: |
          set -euo pipefail

          DOCKER_IMAGE="${{ env.DOCKER_IMAGE }}"
          TAG_PREFIX="${{ github.ref_name }}-"
          API_URL="https://hub.docker.com/v2/repositories/${DOCKER_IMAGE}/tags?page_size=100&ordering=last_updated"
          PATTERN="^${TAG_PREFIX}[0-9a-f]{40}$"

          TAGS_JSON=$(curl -fsSL "$API_URL" || true)
          IMAGE_TAG=""
          if [[ -n "$TAGS_JSON" ]]; then
            IMAGE_TAG=$(echo "$TAGS_JSON" | jq -r '.results[].name' | grep -E "$PATTERN" | head -n 1 || true)
          fi

          if [[ -z "$IMAGE_TAG" ]]; then
            IMAGE_TAG="${{ github.ref_name }}-${{ github.sha }}"
          fi

          COMMIT_SHA="${IMAGE_TAG#${TAG_PREFIX}}"
          if [[ "$COMMIT_SHA" == "$IMAGE_TAG" ]]; then
            COMMIT_SHA="${{ github.sha }}"
          fi

          echo "image-tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "commit-sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

  determine-environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    needs: [build-image, container-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main')
    outputs:
      environment: ${{ steps.env.outputs.environment }}

    steps:
      - name: Determine environment from branch
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

  update-gitops:
    name: Update GitOps Repository
    needs:
      [build-image, container-scan, resolve-image-tag, determine-environment]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main')
    uses: ./.github/workflows/update-gitops.yml
    with:
      service-name: catalogue
      environment: ${{ needs.determine-environment.outputs.environment }}
      image-tag: ${{ needs.resolve-image-tag.outputs.image-tag }}
      docker-image: 8060633493/craftista-catalogue
      commit-sha: ${{ needs.resolve-image-tag.outputs.commit-sha }}
      branch-name: ${{ github.ref_name }}
    secrets:
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      GITOPS_REPO_URL: ${{ secrets.GITOPS_REPO_URL }}

  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs:
      [
        build-and-test,
        dependency-scan,
        sast-scan,
        build-image,
        container-scan,
        determine-environment,
        update-gitops,
      ]
    if: always()

    steps:
      - name: Check build status
        run: |
          if [[ "${{ needs.build-and-test.result }}" == "failure" ]] || \
             [[ "${{ needs.build-image.result }}" == "failure" ]]; then
            echo "❌ Build failed"
            exit 1
          else
            echo "✅ Build successful"
          fi
