name: Promote Image to Environment

on:
    workflow_dispatch:
        inputs:
            service:
                description: "Service to promote"
                required: true
                type: choice
                options:
                    - frontend
                    - catalogue
                    - voting
                    - recommendation
                    - all
            target-environment:
                description: "Target environment"
                required: true
                type: choice
                options:
                    - staging
                    - prod
            image-tag:
                description: "Image tag to promote (e.g., sha-abc1234). Leave empty to auto-detect from dev."
                required: false
                type: string

jobs:
    resolve-tag:
        name: Resolve Image Tag
        runs-on: ubuntu-latest
        outputs:
            tag-map: ${{ steps.resolve.outputs.tag-map }}
            services: ${{ steps.resolve.outputs.services }}
        steps:
            - name: Resolve image tag and services
              id: resolve
              env:
                  GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
              run: |
                  # Determine which services to promote
                  if [[ "${{ inputs.service }}" == "all" ]]; then
                    SERVICES='["frontend","catalogue","voting","recommendation"]'
                  else
                    SERVICES='["${{ inputs.service }}"]'
                  fi
                  echo "services=${SERVICES}" >> "$GITHUB_OUTPUT"

                  if [[ -n "${{ inputs.image-tag }}" ]]; then
                    # Explicit tag provided — use it for all services
                    TAG="${{ inputs.image-tag }}"
                    TAG_MAP="{}"
                    for svc in $(echo "$SERVICES" | jq -r '.[]'); do
                      TAG_MAP=$(echo "$TAG_MAP" | jq --arg s "$svc" --arg t "$TAG" '. + {($s): $t}')
                    done
                    echo "tag-map=${TAG_MAP}" >> "$GITHUB_OUTPUT"
                    echo "✅ Using provided image tag: ${TAG}"
                    echo "$TAG_MAP" | jq .
                  else
                    # Auto-detect from dev overlay in the GitOps repo
                    echo "🔍 Auto-detecting image tags from dev overlay..."

                    GITOPS_REPO="https://x-access-token:${GITOPS_PAT}@github.com/charliepoker/craftista-gitOps.git"
                    git clone --depth 1 "${GITOPS_REPO}" /tmp/gitops-repo

                    TAG_MAP="{}"
                    for svc in $(echo "$SERVICES" | jq -r '.[]'); do
                      PATCH_FILE="/tmp/gitops-repo/kubernetes/overlays/homelab/dev/${svc}/patches.yaml"
                      if [[ ! -f "$PATCH_FILE" ]]; then
                        echo "❌ Dev overlay not found: kubernetes/overlays/homelab/dev/${svc}/patches.yaml"
                        exit 1
                      fi

                      # Extract tag from the image value in the JSON patch
                      IMAGE_VALUE=$(yq eval '.[] | select(.path == "/spec/template/spec/containers/0/image") | .value' "$PATCH_FILE")
                      TAG=$(echo "$IMAGE_VALUE" | cut -d: -f2)

                      if [[ -z "$TAG" || "$TAG" == "$IMAGE_VALUE" ]]; then
                        echo "❌ Could not extract image tag for ${svc} from ${PATCH_FILE}"
                        exit 1
                      fi

                      TAG_MAP=$(echo "$TAG_MAP" | jq --arg s "$svc" --arg t "$TAG" '. + {($s): $t}')
                      echo "  ${svc}: ${TAG}"
                    done

                    echo "tag-map=${TAG_MAP}" >> "$GITHUB_OUTPUT"
                    echo ""
                    echo "✅ Auto-detected tags:"
                    echo "$TAG_MAP" | jq .

                    rm -rf /tmp/gitops-repo
                  fi

    validate-image:
        name: Validate Image Exists (${{ matrix.service }})
        runs-on: ubuntu-latest
        needs: resolve-tag
        strategy:
            matrix:
                service: ${{ fromJson(needs.resolve-tag.outputs.services) }}
        steps:
            - name: Determine docker image and tag
              id: image
              run: |
                  echo "docker-image=8060633493/craftista-${{ matrix.service }}" >> "$GITHUB_OUTPUT"
                  TAG=$(echo '${{ needs.resolve-tag.outputs.tag-map }}' | jq -r '."${{ matrix.service }}"')
                  echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

            - name: Verify image tag exists on Docker Hub
              run: |
                  IMAGE="${{ steps.image.outputs.docker-image }}"
                  TAG="${{ steps.image.outputs.tag }}"

                  echo "🔍 Checking if ${IMAGE}:${TAG} exists..."

                  HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                    "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${TAG}")

                  if [[ "$HTTP_CODE" == "200" ]]; then
                    echo "✅ Image ${IMAGE}:${TAG} exists"
                  else
                    echo "❌ Image ${IMAGE}:${TAG} not found (HTTP ${HTTP_CODE})"
                    echo "   Make sure this image was built and pushed by the CI pipeline."
                    exit 1
                  fi

    confirm-production:
        name: Production Approval
        runs-on: ubuntu-latest
        needs: [resolve-tag, validate-image]
        if: inputs.target-environment == 'prod'
        environment: production
        steps:
            - name: Production promotion approved
              run: |
                  echo "✅ Production promotion approved by: ${{ github.actor }}"
                  echo "   Services: ${{ needs.resolve-tag.outputs.services }}"
                  echo "   Tags: ${{ needs.resolve-tag.outputs.tag-map }}"

    promote:
        name: Promote ${{ matrix.service }} to ${{ inputs.target-environment }}
        needs: [resolve-tag, validate-image, confirm-production]
        if: always() && needs.validate-image.result == 'success' && (needs.confirm-production.result == 'success' || needs.confirm-production.result == 'skipped')
        strategy:
            matrix:
                service: ${{ fromJson(needs.resolve-tag.outputs.services) }}
            max-parallel: 1
        uses: ./.github/workflows/update-gitops.yml
        with:
            service-name: ${{ matrix.service }}
            environment: ${{ inputs.target-environment }}
            image-tag: ${{ fromJson(needs.resolve-tag.outputs.tag-map)[matrix.service] }}
            docker-image: 8060633493/craftista-${{ matrix.service }}
            commit-sha: ${{ github.sha }}
            branch-name: promote-${{ inputs.target-environment }}
        secrets:
            VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
            VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
            GITOPS_REPO_URL: ${{ secrets.GITOPS_REPO_URL }}
            GITOPS_PAT: ${{ secrets.GITOPS_PAT }}

    verify:
        name: Verify Promotion
        needs: [resolve-tag, promote]
        if: always() && needs.promote.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - name: Promotion summary
              run: |
                  echo "🚀 Promotion Summary"
                  echo "===================="
                  echo "Services: ${{ needs.resolve-tag.outputs.services }}"
                  echo "Target: ${{ inputs.target-environment }}"
                  echo "Tags: ${{ needs.resolve-tag.outputs.tag-map }}"
                  echo "Triggered by: ${{ github.actor }}"
                  echo ""
                  echo "✅ GitOps repo updated. ArgoCD will sync the changes automatically."
