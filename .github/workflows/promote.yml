name: Promote Image to Environment

on:
    workflow_dispatch:
        inputs:
            service:
                description: "Service to promote"
                required: true
                type: choice
                options:
                    - frontend
                    - catalogue
                    - voting
                    - recommendation
                    - all
            target-environment:
                description: "Target environment"
                required: true
                type: choice
                options:
                    - staging
                    - prod
            image-tag:
                description: "Image tag to promote (e.g., sha-abc1234). Leave empty to auto-detect from dev."
                required: false
                type: string

env:
    DOCKER_IMAGES: |
        frontend=8060633493/craftista-frontend
        catalogue=8060633493/craftista-catalogue
        voting=8060633493/craftista-voting
        recommendation=8060633493/craftista-recommendation

jobs:
    resolve-tag:
        name: Resolve Image Tag
        runs-on: ubuntu-latest
        outputs:
            image-tag: ${{ steps.resolve.outputs.image-tag }}
            services: ${{ steps.resolve.outputs.services }}
        steps:
            - name: Resolve image tag and services
              id: resolve
              run: |
                  # Determine which services to promote
                  if [[ "${{ inputs.service }}" == "all" ]]; then
                    echo 'services=["frontend","catalogue","voting","recommendation"]' >> "$GITHUB_OUTPUT"
                  else
                    echo 'services=["${{ inputs.service }}"]' >> "$GITHUB_OUTPUT"
                  fi

                  # Use provided tag or fail if not provided
                  if [[ -n "${{ inputs.image-tag }}" ]]; then
                    echo "image-tag=${{ inputs.image-tag }}" >> "$GITHUB_OUTPUT"
                    echo "✅ Using provided image tag: ${{ inputs.image-tag }}"
                  else
                    echo "❌ No image tag provided. Check the dev overlay in the GitOps repo for the current tag."
                    echo "   Example: sha-abc1234"
                    exit 1
                  fi

    validate-image:
        name: Validate Image Exists (${{ matrix.service }})
        runs-on: ubuntu-latest
        needs: resolve-tag
        strategy:
            matrix:
                service: ${{ fromJson(needs.resolve-tag.outputs.services) }}
        steps:
            - name: Determine docker image name
              id: image
              run: |
                  case "${{ matrix.service }}" in
                    frontend)      echo "docker-image=8060633493/craftista-frontend" >> "$GITHUB_OUTPUT" ;;
                    catalogue)     echo "docker-image=8060633493/craftista-catalogue" >> "$GITHUB_OUTPUT" ;;
                    voting)        echo "docker-image=8060633493/craftista-voting" >> "$GITHUB_OUTPUT" ;;
                    recommendation) echo "docker-image=8060633493/craftista-recommendation" >> "$GITHUB_OUTPUT" ;;
                  esac

            - name: Verify image tag exists on Docker Hub
              run: |
                  IMAGE="${{ steps.image.outputs.docker-image }}"
                  TAG="${{ needs.resolve-tag.outputs.image-tag }}"

                  echo "🔍 Checking if ${IMAGE}:${TAG} exists..."

                  HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                    "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${TAG}")

                  if [[ "$HTTP_CODE" == "200" ]]; then
                    echo "✅ Image ${IMAGE}:${TAG} exists"
                  else
                    echo "❌ Image ${IMAGE}:${TAG} not found (HTTP ${HTTP_CODE})"
                    echo "   Make sure this image was built and pushed by the CI pipeline."
                    exit 1
                  fi

    confirm-production:
        name: Production Approval
        runs-on: ubuntu-latest
        needs: [resolve-tag, validate-image]
        if: inputs.target-environment == 'prod'
        environment: production
        steps:
            - name: Production promotion approved
              run: |
                  echo "✅ Production promotion approved by: ${{ github.actor }}"
                  echo "   Services: ${{ needs.resolve-tag.outputs.services }}"
                  echo "   Image tag: ${{ needs.resolve-tag.outputs.image-tag }}"

    promote:
        name: Promote ${{ matrix.service }} to ${{ inputs.target-environment }}
        needs: [resolve-tag, validate-image, confirm-production]
        if: always() && needs.validate-image.result == 'success' && (needs.confirm-production.result == 'success' || needs.confirm-production.result == 'skipped')
        strategy:
            matrix:
                service: ${{ fromJson(needs.resolve-tag.outputs.services) }}
            max-parallel: 1
        uses: ./.github/workflows/update-gitops.yml
        with:
            service-name: ${{ matrix.service }}
            environment: ${{ inputs.target-environment }}
            image-tag: ${{ needs.resolve-tag.outputs.image-tag }}
            docker-image: 8060633493/craftista-${{ matrix.service }}
            commit-sha: ${{ github.sha }}
            branch-name: promote-${{ inputs.target-environment }}
        secrets:
            VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
            VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
            GITOPS_REPO_URL: ${{ secrets.GITOPS_REPO_URL }}

    verify:
        name: Verify Promotion
        needs: [resolve-tag, promote]
        if: always() && needs.promote.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - name: Promotion summary
              run: |
                  echo "🚀 Promotion Summary"
                  echo "===================="
                  echo "Services: ${{ needs.resolve-tag.outputs.services }}"
                  echo "Target: ${{ inputs.target-environment }}"
                  echo "Image tag: ${{ needs.resolve-tag.outputs.image-tag }}"
                  echo "Triggered by: ${{ github.actor }}"
                  echo ""
                  echo "✅ GitOps repo updated. ArgoCD will sync the changes automatically."
