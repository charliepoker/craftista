name: CI - Recommendation Service

on:
  push:
    branches: [develop, staging, main]
    paths:
      - "recommendation/**"
      - ".github/workflows/ci-recommendation.yml"
  pull_request:
    branches: [develop, staging, main]
    paths:
      - "recommendation/**"
      - ".github/workflows/ci-recommendation.yml"

env:
  SERVICE_NAME: recommendation
  DOCKER_REGISTRY: docker.io
  DOCKER_IMAGE: 8060633493/craftista-recommendation

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./recommendation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: recommendation/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build application
        run: go build -v ./...

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Generate coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: recommendation-coverage
          path: |
            recommendation/coverage.out
            recommendation/coverage.html

      - name: Display coverage summary
        run: go tool cover -func=coverage.out

  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: ./recommendation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
        continue-on-error: true

      - name: Run govulncheck
        run: |
          govulncheck ./... > govulncheck-results.txt || true
          cat govulncheck-results.txt
        continue-on-error: true

      - name: Run go mod verify
        run: go mod verify

      - name: Check for known vulnerabilities in dependencies
        run: |
          govulncheck -json ./... > vuln-report.json || true
        continue-on-error: true

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: recommendation-security-scans
          path: |
            recommendation/govulncheck-results.txt
            recommendation/vuln-report.json

  # TODO: Uncomment when SonarQube server is set up
  sast-scan:
    name: SAST - SonarQube Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: ./recommendation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for better analysis

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: recommendation/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: recommendation
          args: >
            -Dsonar.projectKey=craftista-recommendation
            -Dsonar.sources=.
            -Dsonar.exclusions=**/*_test.go,**/vendor/**,**/tests/**
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/*_test.go
            -Dsonar.go.coverage.reportPaths=coverage.out

      - name: Check SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        with:
          scanMetadataReportFile: recommendation/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build-and-test, dependency-scan]
    if: github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=long,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./recommendation
          file: ./recommendation/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'push'

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}-${{ github.sha }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0" # Don't fail the build, just report

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: "trivy-results.sarif"

      - name: Run Trivy vulnerability scanner (table output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}-${{ github.sha }}
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1" # Fail if critical vulnerabilities found
        continue-on-error: true

  resolve-image-tag:
    name: Resolve image tag (Docker Hub)
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.pick.outputs.image-tag }}
      commit-sha: ${{ steps.pick.outputs.commit-sha }}

    steps:
      - name: Pick newest SHA-based tag from Docker Hub (no latest)
        id: pick
        shell: bash
        run: |
          set -euo pipefail

          DOCKER_IMAGE="${{ env.DOCKER_IMAGE }}"
          TAG_PREFIX="${{ github.ref_name }}-"
          API_URL="https://hub.docker.com/v2/repositories/${DOCKER_IMAGE}/tags?page_size=100&ordering=last_updated"
          PATTERN="^${TAG_PREFIX}[0-9a-f]{40}$"

          TAGS_JSON=$(curl -fsSL "$API_URL" || true)
          IMAGE_TAG=""
          if [[ -n "$TAGS_JSON" ]]; then
            IMAGE_TAG=$(echo "$TAGS_JSON" | jq -r '.results[].name' | grep -E "$PATTERN" | head -n 1 || true)
          fi

          if [[ -z "$IMAGE_TAG" ]]; then
            IMAGE_TAG="${{ github.ref_name }}-${{ github.sha }}"
          fi

          COMMIT_SHA="${IMAGE_TAG#${TAG_PREFIX}}"
          if [[ "$COMMIT_SHA" == "$IMAGE_TAG" ]]; then
            COMMIT_SHA="${{ github.sha }}"
          fi

          echo "image-tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "commit-sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

  determine-environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    needs: [build-image, container-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main')
    outputs:
      environment: ${{ steps.env.outputs.environment }}

    steps:
      - name: Determine environment from branch
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

  update-gitops:
    name: Update GitOps Repository
    needs:
      [build-image, container-scan, resolve-image-tag, determine-environment]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main')
    uses: ./.github/workflows/update-gitops.yml
    with:
      service-name: recommendation
      environment: ${{ needs.determine-environment.outputs.environment }}
      image-tag: ${{ needs.resolve-image-tag.outputs.image-tag }}
      docker-image: 8060633493/craftista-recommendation
      commit-sha: ${{ needs.resolve-image-tag.outputs.commit-sha }}
      branch-name: ${{ github.ref_name }}
    secrets:
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      GITOPS_REPO_URL: ${{ secrets.GITOPS_REPO_URL }}

  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs:
      [
        build-and-test,
        dependency-scan,
        sast-scan,
        build-image,
        container-scan,
        determine-environment,
        update-gitops,
      ]
    if: always()

    steps:
      - name: Check build status
        run: |
          if [[ "${{ needs.build-and-test.result }}" == "failure" ]] || \
             [[ "${{ needs.build-image.result }}" == "failure" ]]; then
            echo "❌ Build failed"
            exit 1
          else
            echo "✅ Build successful"
          fi
