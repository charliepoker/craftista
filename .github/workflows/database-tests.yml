name: Database Testing Pipeline

on:
    pull_request:
        types: [opened, synchronize, reopened]
        branches: [develop, main]
        paths:
            - "catalogue/**"
            - "voting/**"
            - "recommendation/**"
            - ".github/workflows/database-tests.yml"

    push:
        branches: [develop, main]
        paths:
            - "catalogue/**"
            - "voting/**"
            - "recommendation/**"
            - ".github/workflows/database-tests.yml"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    # Database configuration for testing
    POSTGRES_DB: testdb
    POSTGRES_USER: testuser
    POSTGRES_PASSWORD: testpass
    MONGODB_DATABASE: test_catalogue
    REDIS_PASSWORD: testredis

jobs:
    detect-database-changes:
        runs-on: ubuntu-latest
        outputs:
            catalogue: ${{ steps.changes.outputs.catalogue }}
            voting: ${{ steps.changes.outputs.voting }}
            recommendation: ${{ steps.changes.outputs.recommendation }}
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: changes
              with:
                  filters: |
                      catalogue:
                        - 'catalogue/**'
                        - 'catalogue/database/**'
                        - 'catalogue/repository/**'
                        - 'catalogue/tests/**'
                      voting:
                        - 'voting/**'
                        - 'voting/src/main/java/**/repository/**'
                        - 'voting/src/main/java/**/service/**'
                        - 'voting/src/test/**'
                      recommendation:
                        - 'recommendation/**'
                        - 'recommendation/database/**'
                        - 'recommendation/repository/**'
                        - 'recommendation/tests/**'

    test-catalogue-database:
        needs: detect-database-changes
        if: ${{ needs.detect-database-changes.outputs.catalogue == 'true' }}
        runs-on: ubuntu-latest

        services:
            mongodb:
                image: mongo:7.0
                env:
                    MONGO_INITDB_ROOT_USERNAME: root
                    MONGO_INITDB_ROOT_PASSWORD: rootpass
                    MONGO_INITDB_DATABASE: ${{ env.MONGODB_DATABASE }}
                ports:
                    - 27017:27017
                options: >-
                    --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        defaults:
            run:
                working-directory: catalogue

        steps:
            - uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"
                  cache: "pip"
                  cache-dependency-path: catalogue/requirements.txt

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install -r requirements-test.txt
                  pip install pytest pytest-cov pytest-asyncio pytest-mock

            - name: Wait for MongoDB
              run: |
                  timeout 60s bash -c 'until mongosh --host localhost:27017 --eval "db.runCommand({ping: 1})" --quiet; do sleep 2; done'

            - name: Setup test database
              run: |
                  # Create test database and collections
                  mongosh --host localhost:27017 --eval "
                    use ${{ env.MONGODB_DATABASE }};
                    db.createCollection('products');
                    db.products.createIndex({ 'name': 'text', 'description': 'text' });
                    db.products.createIndex({ 'category': 1, 'active': 1 });
                    db.products.createIndex({ 'tags': 1 });
                    db.products.createIndex({ 'featured': 1, 'active': 1 });
                    db.products.createIndex({ 'created_at': -1 });
                  "

            - name: Run unit tests
              run: |
                  pytest tests/ -v --cov=. --cov-report=xml --cov-report=html --cov-report=term-missing
              env:
                  MONGODB_URL: mongodb://root:rootpass@localhost:27017/${{ env.MONGODB_DATABASE }}?authSource=admin
                  TESTING: true

            - name: Run integration tests
              run: |
                  pytest tests/integration/ -v --cov-append --cov=. --cov-report=xml
              env:
                  MONGODB_URL: mongodb://root:rootpass@localhost:27017/${{ env.MONGODB_DATABASE }}?authSource=admin
                  TESTING: true

            - name: Run performance tests
              run: |
                  pytest tests/performance/ -v --benchmark-only --benchmark-json=benchmark.json || true
              env:
                  MONGODB_URL: mongodb://root:rootpass@localhost:27017/${{ env.MONGODB_DATABASE }}?authSource=admin
                  TESTING: true

            - name: Upload coverage reports
              uses: codecov/codecov-action@v3
              with:
                  file: ./catalogue/coverage.xml
                  flags: catalogue
                  name: catalogue-coverage
                  fail_ci_if_error: false

            - name: Archive test results
              uses: actions/upload-artifact@v3
              if: always()
              with:
                  name: catalogue-test-results
                  path: |
                      catalogue/coverage.xml
                      catalogue/htmlcov/
                      catalogue/benchmark.json

    test-voting-database:
        needs: detect-database-changes
        if: ${{ needs.detect-database-changes.outputs.voting == 'true' }}
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:15-alpine
                env:
                    POSTGRES_DB: ${{ env.POSTGRES_DB }}
                    POSTGRES_USER: ${{ env.POSTGRES_USER }}
                    POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        defaults:
            run:
                working-directory: voting

        steps:
            - uses: actions/checkout@v4

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: "maven"

            - name: Wait for PostgreSQL
              run: |
                  timeout 60s bash -c 'until pg_isready -h localhost -p 5432 -U ${{ env.POSTGRES_USER }}; do sleep 2; done'

            - name: Setup test database
              run: |
                  PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -h localhost -U ${{ env.POSTGRES_USER }} -d ${{ env.POSTGRES_DB }} -c "
                    CREATE TABLE IF NOT EXISTS origami (
                      id BIGSERIAL PRIMARY KEY,
                      origami_id VARCHAR(255) UNIQUE NOT NULL,
                      name VARCHAR(255) NOT NULL,
                      description TEXT,
                      image_url VARCHAR(500),
                      vote_count INTEGER NOT NULL DEFAULT 0,
                      active BOOLEAN NOT NULL DEFAULT true,
                      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
                    );
                    CREATE INDEX IF NOT EXISTS idx_origami_active ON origami(active);
                    CREATE INDEX IF NOT EXISTS idx_origami_vote_count ON origami(vote_count DESC);
                  "

            - name: Run unit tests
              run: |
                  mvn test -Dspring.profiles.active=test -Dspring.datasource.url=jdbc:postgresql://localhost:5432/${{ env.POSTGRES_DB }} -Dspring.datasource.username=${{ env.POSTGRES_USER }} -Dspring.datasource.password=${{ env.POSTGRES_PASSWORD }}

            - name: Run integration tests
              run: |
                  mvn verify -Dspring.profiles.active=test -Dspring.datasource.url=jdbc:postgresql://localhost:5432/${{ env.POSTGRES_DB }} -Dspring.datasource.username=${{ env.POSTGRES_USER }} -Dspring.datasource.password=${{ env.POSTGRES_PASSWORD }}

            - name: Generate test coverage report
              run: |
                  mvn jacoco:report

            - name: Upload coverage reports
              uses: codecov/codecov-action@v3
              with:
                  file: ./voting/target/site/jacoco/jacoco.xml
                  flags: voting
                  name: voting-coverage
                  fail_ci_if_error: false

            - name: Archive test results
              uses: actions/upload-artifact@v3
              if: always()
              with:
                  name: voting-test-results
                  path: |
                      voting/target/surefire-reports/
                      voting/target/site/jacoco/

    test-recommendation-database:
        needs: detect-database-changes
        if: ${{ needs.detect-database-changes.outputs.recommendation == 'true' }}
        runs-on: ubuntu-latest

        services:
            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        defaults:
            run:
                working-directory: recommendation

        steps:
            - uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v4
              with:
                  go-version: "1.21"
                  cache-dependency-path: recommendation/go.sum

            - name: Install dependencies
              run: |
                  go mod download
                  go install github.com/jstemmer/go-junit-report/v2@latest

            - name: Wait for Redis
              run: |
                                    timeout 60s bash -c 'until redis-cli -h localhost -p 6379 ping; do sleep 2; done'

            - name: Run unit tests
              run: |
                  go test -v -race -coverprofile=coverage.out -covermode=atomic ./... 2>&1 | tee test_output.txt
                  go-junit-report -in test_output.txt -out junit.xml
              env:
                  REDIS_URL: redis://localhost:6379/0
                  TESTING: true

            - name: Run integration tests
              run: |
                  go test -v -tags=integration -coverprofile=integration_coverage.out -covermode=atomic ./tests/ 2>&1 | tee integration_output.txt
                  go-junit-report -in integration_output.txt -out integration_junit.xml
              env:
                  REDIS_URL: redis://localhost:6379/0
                  TESTING: true

            - name: Run performance tests
              run: |
                  go test -v -bench=. -benchmem -run=^$ ./tests/ > benchmark.txt || true
              env:
                  REDIS_URL: redis://localhost:6379/0
                  TESTING: true

            - name: Generate coverage report
              run: |
                  go tool cover -html=coverage.out -o coverage.html
                  go tool cover -func=coverage.out -o coverage.txt

            - name: Upload coverage reports
              uses: codecov/codecov-action@v3
              with:
                  file: ./recommendation/coverage.out
                  flags: recommendation
                  name: recommendation-coverage
                  fail_ci_if_error: false

            - name: Archive test results
              uses: actions/upload-artifact@v3
              if: always()
              with:
                  name: recommendation-test-results
                  path: |
                      recommendation/coverage.out
                      recommendation/coverage.html
                      recommendation/coverage.txt
                      recommendation/junit.xml
                      recommendation/integration_junit.xml
                      recommendation/benchmark.txt

    database-migration-tests:
        runs-on: ubuntu-latest
        needs: [detect-database-changes]
        if: ${{ needs.detect-database-changes.outputs.catalogue == 'true' || needs.detect-database-changes.outputs.voting == 'true' }}

        services:
            postgres:
                image: postgres:15-alpine
                env:
                    POSTGRES_DB: migration_test
                    POSTGRES_USER: ${{ env.POSTGRES_USER }}
                    POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

            mongodb:
                image: mongo:7.0
                env:
                    MONGO_INITDB_ROOT_USERNAME: root
                    MONGO_INITDB_ROOT_PASSWORD: rootpass
                ports:
                    - 27017:27017
                options: >-
                    --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"

            - name: Test MongoDB migrations
              if: ${{ needs.detect-database-changes.outputs.catalogue == 'true' }}
              run: |
                  cd catalogue
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

                  # Test data migration script
                  python migrate_data.py --test-mode
              env:
                  MONGODB_URL: mongodb://root:rootpass@localhost:27017/migration_test?authSource=admin

            - name: Test PostgreSQL migrations
              if: ${{ needs.detect-database-changes.outputs.voting == 'true' }}
              run: |
                  cd voting

                  # Test Flyway migrations
                  mvn flyway:migrate -Dflyway.url=jdbc:postgresql://localhost:5432/migration_test -Dflyway.user=${{ env.POSTGRES_USER }} -Dflyway.password=${{ env.POSTGRES_PASSWORD }}

                  # Test rollback capability
                  mvn flyway:undo -Dflyway.url=jdbc:postgresql://localhost:5432/migration_test -Dflyway.user=${{ env.POSTGRES_USER }} -Dflyway.password=${{ env.POSTGRES_PASSWORD }} || true

    generate-test-report:
        runs-on: ubuntu-latest
        needs:
            [
                test-catalogue-database,
                test-voting-database,
                test-recommendation-database,
                database-migration-tests,
            ]
        if: always()

        steps:
            - uses: actions/checkout@v4

            - name: Download all test artifacts
              uses: actions/download-artifact@v3
              with:
                  path: test-results/

            - name: Setup Python for report generation
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

            - name: Install report dependencies
              run: |
                  pip install jinja2 lxml beautifulsoup4

            - name: Generate consolidated test report
              run: |
                  python test-framework/scripts/generate-test-report.py \
                    --input-dir test-results/ \
                    --output-dir consolidated-report/ \
                    --format html

            - name: Upload consolidated report
              uses: actions/upload-artifact@v3
              with:
                  name: consolidated-database-test-report
                  path: consolidated-report/

            - name: Comment PR with test results
              if: github.event_name == 'pull_request'
              uses: actions/github-script@v6
              with:
                  script: |
                      const fs = require('fs');
                      const path = require('path');

                      // Read test summary if available
                      let summary = 'Database tests completed. Check artifacts for detailed results.';

                      try {
                        const summaryPath = 'consolidated-report/summary.txt';
                        if (fs.existsSync(summaryPath)) {
                          summary = fs.readFileSync(summaryPath, 'utf8');
                        }
                      } catch (error) {
                        console.log('Could not read summary file:', error.message);
                      }

                      const comment = `## 🗄️ Database Test Results

                      ${summary}

                      ### Test Coverage by Service
                      - **Catalogue Service**: MongoDB integration tests
                      - **Voting Service**: PostgreSQL integration tests  
                      - **Recommendation Service**: Redis integration tests
                      - **Migration Tests**: Database schema and data migration validation

                      📊 Detailed reports are available in the workflow artifacts.
                      `;

                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: comment
                      });

    quality-gates:
        runs-on: ubuntu-latest
        needs:
            [
                test-catalogue-database,
                test-voting-database,
                test-recommendation-database,
            ]
        if: always()

        steps:
            - name: Check test results
              run: |
                  echo "Catalogue tests: ${{ needs.test-catalogue-database.result }}"
                  echo "Voting tests: ${{ needs.test-voting-database.result }}"
                  echo "Recommendation tests: ${{ needs.test-recommendation-database.result }}"

                  # Fail if any critical tests failed
                  if [[ "${{ needs.test-catalogue-database.result }}" == "failure" ]] || \
                     [[ "${{ needs.test-voting-database.result }}" == "failure" ]] || \
                     [[ "${{ needs.test-recommendation-database.result }}" == "failure" ]]; then
                    echo "❌ Database tests failed. Deployment blocked."
                    exit 1
                  fi

                  echo "✅ All database tests passed. Ready for deployment."

            - name: Notify on failure
              if: failure()
              run: |
                  echo "::error::Database testing quality gates failed. Review test results before proceeding with deployment."
