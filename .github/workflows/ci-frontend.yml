name: CI - Frontend Service

on:
  push:
    branches: [develop]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"
  pull_request:
    branches: [develop]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-frontend.yml"

env:
  SERVICE_NAME: frontend
  DOCKER_REGISTRY: docker.io
  DOCKER_IMAGE: 8060633493/craftista-frontend

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests
        run: npm run test:unit

      - name: Generate test coverage
        run: npm run test:coverage:ci

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Run npm audit
        run: |
          npm audit --audit-level=high --production || true
          npm audit --json --production > audit-results.json || true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: frontend-audit-results
          path: frontend/audit-results.json

  # TODO: Uncomment when SonarQube server is set up
  sast-scan:
    name: SAST - SonarQube Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for better analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Generate coverage
        working-directory: ./frontend
        run: npm run test:coverage:ci

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FRONTEND }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectKey=craftista-frontend
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,test/**,coverage/**
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

      - name: Check SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        with:
          scanMetadataReportFile: frontend/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FRONTEND }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build-and-test, dependency-scan]
    if: github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.tag.outputs.image-tag }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image-tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.image-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'push'

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ needs.build-image.outputs.image-tag }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0" # Don't fail the build, just report

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: "trivy-results.sarif"

      - name: Run Trivy vulnerability scanner (table output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ needs.build-image.outputs.image-tag }}
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1" # Fail if critical vulnerabilities found
        continue-on-error: true

  update-gitops:
    name: Update GitOps Repository
    needs: [build-image, container-scan]
    if: github.event_name == 'push'
    uses: ./.github/workflows/update-gitops.yml
    with:
      service-name: frontend
      environment: dev
      image-tag: ${{ needs.build-image.outputs.image-tag }}
      docker-image: 8060633493/craftista-frontend
      commit-sha: ${{ github.sha }}
      branch-name: ${{ github.ref_name }}
    secrets:
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      GITOPS_REPO_URL: ${{ secrets.GITOPS_REPO_URL }}
      GITOPS_PAT: ${{ secrets.GITOPS_PAT }}

  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs:
      [
        build-and-test,
        dependency-scan,
        sast-scan,
        build-image,
        container-scan,
        update-gitops,
      ]
    if: always()

    steps:
      - name: Check build status
        run: |
          if [[ "${{ needs.build-and-test.result }}" == "failure" ]] || \
             [[ "${{ needs.build-image.result }}" == "failure" ]]; then
            echo "❌ Build failed"
            exit 1
          else
            echo "✅ Build successful"
          fi
